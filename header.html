<header class="fixed w-full top-0 z-50 flex flex-col transition-all duration-500">
    <!-- Banner Promocional -->
    <div id="promo-banner" class="bg-gradient-to-r from-accent to-magenta-600 text-white text-xs md:text-sm font-poppins py-2 px-4 relative z-10 transition-all duration-300 shadow-sm">
        <div class="max-w-6xl mx-auto flex items-center justify-center text-center">
            <p>✨ ¡Oferta de Primavera! 20% de descuento en la membresía Ejecutiva. <a href="membresias.html" class="underline font-bold hover:text-gray-200 ml-1">Ver promoción</a></p>
        </div>
        <button id="close-promo-btn" aria-label="Cerrar banner" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-white/80 hover:text-white transition-colors focus:outline-none">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>
    <div id="navbar-bg" class="bg-brand-light/60 dark:bg-black/60 backdrop-blur-md border-b border-transparent w-full transition-all duration-500">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div id="navbar-container" class="flex justify-between items-center h-20 transition-all duration-500">
                <a href="index.html" class="flex-shrink-0 flex items-center">
                    <img src="logo.png" alt="Linet Coaching Logo" class="h-10 w-auto">
                </a>
                <div class="flex items-center gap-2 md:gap-6">
                    <nav class="hidden md:flex font-poppins gap-6">
                        <a href="index.html" data-i18n="nav.home" class="hover:text-accent-hover transition-colors nav-link">Inicio</a>
                        <a href="sobre-mi.html" data-i18n="nav.about" class="hover:text-accent-hover transition-colors nav-link">Sobre Mí</a>
                        <a href="cursos.html" data-i18n="nav.courses" class="hover:text-accent-hover transition-colors nav-link">Cursos</a>
                        <a href="blog.html" data-i18n="nav.blog" class="hover:text-accent-hover transition-colors nav-link">Blog</a>
                        <a href="shop.html" class="hover:text-accent-hover transition-colors nav-link inline-flex items-center gap-1.5 group"><i class="fa-solid fa-cart-shopping text-accent group-hover:animate-wiggle-more transition-transform"></i> <span data-i18n="nav.shop">Tienda</span></a>
                        <a href="membresias.html" data-i18n="nav.memberships" class="hover:text-accent-hover transition-colors nav-link">Membresías</a>
                        <a href="contacto.html" data-i18n="nav.contact" class="hover:text-accent-hover transition-colors nav-link">Contacto</a>
                    </nav>
                    <button id="lang-toggle" type="button" aria-label="Cambiar idioma" class="text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-brand-dark focus:outline-none rounded-lg text-sm p-2.5 transition-colors font-bold uppercase w-10 text-center">
                        <span id="current-lang-text">ES</span>
                    </button>
                    <button id="theme-toggle" type="button" aria-label="Alternar tema" class="text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-brand-dark focus:outline-none rounded-lg text-sm p-2.5 transition-colors">
                        <i id="theme-toggle-dark-icon" class="hidden fa-solid fa-moon text-lg"></i>
                        <i id="theme-toggle-light-icon" class="hidden fa-solid fa-sun text-lg"></i>
                    </button>
                
                <!-- Botones del Carrito -->
                <button id="empty-cart-btn" type="button" aria-label="Vaciar carrito" title="Vaciar carrito" class="hidden text-gray-400 hover:text-accent hover:bg-gray-100 dark:hover:bg-brand-dark focus:outline-none rounded-lg text-sm p-2.5 transition-colors">
                    <i class="fa-solid fa-trash-can text-lg"></i>
                </button>
                <button id="cart-btn" type="button" aria-label="Ver carrito" aria-haspopup="dialog" class="relative text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-brand-dark focus:outline-none rounded-lg text-sm p-2.5 transition-colors">
                    <i class="fa-solid fa-cart-shopping text-lg"></i>
                    <span id="cart-counter" aria-live="polite" class="absolute top-1 right-1 bg-accent text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center transform scale-0 transition-transform duration-300 pointer-events-none">0</span>
                </button>

                <button id="mobile-menu-btn" type="button" aria-expanded="false" aria-controls="mobile-menu" aria-label="Abrir menú" class="md:hidden text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-brand-dark focus:outline-none rounded-lg text-sm p-2.5 transition-colors">
                        <i class="fa-solid fa-bars text-lg"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <!-- Menú Móvil -->
    <div id="mobile-menu" class="hidden md:hidden absolute top-full left-0 w-full bg-brand-light/80 dark:bg-brand-darker/80 backdrop-blur-md border-b border-gray-200 dark:border-brand-dark shadow-lg z-40 py-4 px-6 flex-col gap-4 text-center font-poppins transition-colors duration-300">
        <a href="index.html" data-i18n="nav.home" class="hover:text-accent-hover transition-colors nav-link-mobile">Inicio</a>
        <a href="sobre-mi.html" data-i18n="nav.about" class="hover:text-accent-hover transition-colors nav-link-mobile">Sobre Mí</a>
        <a href="cursos.html" data-i18n="nav.courses" class="hover:text-accent-hover transition-colors nav-link-mobile">Cursos</a>
        <a href="blog.html" data-i18n="nav.blog" class="hover:text-accent-hover transition-colors nav-link-mobile">Blog</a>
        <a href="shop.html" class="hover:text-accent-hover transition-colors nav-link-mobile inline-flex items-center justify-center gap-1.5 group"><i class="fa-solid fa-cart-shopping text-accent group-hover:animate-wiggle-more transition-transform"></i> <span data-i18n="nav.shop">Tienda</span></a>
        <a href="membresias.html" data-i18n="nav.memberships" class="hover:text-accent-hover transition-colors nav-link-mobile">Membresías</a>
        <a href="contacto.html" data-i18n="nav.contact" class="hover:text-accent-hover transition-colors nav-link-mobile">Contacto</a>
    </div>
</header>
